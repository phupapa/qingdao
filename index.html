<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Qingdao Travel Map Pro</title>

  <link rel="icon" href="data:," />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
    rel="stylesheet"
  />

  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  />

  <link rel="stylesheet" href="./index.css" />
</head>
<body>
  <div class="app-shell">
    <div id="map"></div>

    <div class="map-topbar">
      <div class="map-topbar-left">
        <button class="circle-btn" type="button" id="openSheetBtn" aria-label="Open places panel">
          ☰
        </button>
      </div>

      <div class="map-search-wrap">
        <div class="map-search">
          <span class="search-icon">🔎</span>
          <input
            id="searchInput"
            type="text"
            placeholder="Search place เช่น Cathedral, Taidong, Beer Museum, Hotel"
          />
        </div>
      </div>
    </div>

    <div class="chip-row" id="chipBar">
      <button class="chip-btn active" data-filter="all" type="button">All</button>
      <button class="chip-btn" data-filter="day1" type="button">Day 1</button>
      <button class="chip-btn" data-filter="day2" type="button">Day 2</button>
      <button class="chip-btn" data-filter="day3" type="button">Day 3</button>
      <button class="chip-btn" data-filter="photo" type="button">Photo</button>
      <button class="chip-btn" data-filter="food" type="button">Food</button>
      <button class="chip-btn" data-filter="metro" type="button">Metro</button>
    </div>

    <aside class="bottom-sheet expanded" id="bottomSheet">
      <div class="bottom-sheet-handle-wrap">
        <button class="bottom-sheet-handle" id="sheetHandle" type="button" aria-label="Toggle bottom sheet"></button>
      </div>

      <div class="sheet-header">
        <div class="sheet-title-block">
          <h1>Qingdao Travel Map</h1>
          <p>Tap a place card to zoom on map · all details are shown in cards</p>
        </div>
      </div>

      <div class="sheet-filter-row sidebar-actions"></div>

      <div class="sheet-scroll" id="sidebarContent"></div>

      <div class="bottom-nav">
        <button class="bottom-nav-item active" type="button" data-filter="all">
          <span class="bottom-nav-icon">⌂</span>
          <span class="bottom-nav-label">Home</span>
        </button>

        <button class="bottom-nav-item" type="button" data-filter="day1">
          <span class="bottom-nav-icon">①</span>
          <span class="bottom-nav-label">Day 1</span>
        </button>

        <button class="bottom-nav-item" type="button" data-filter="day2">
          <span class="bottom-nav-icon">②</span>
          <span class="bottom-nav-label">Day 2</span>
        </button>

        <button class="bottom-nav-item" type="button" data-filter="day3">
          <span class="bottom-nav-icon">③</span>
          <span class="bottom-nav-label">Day 3</span>
        </button>

        <button class="bottom-nav-item" type="button" data-filter="photo">
          <span class="bottom-nav-icon">⌘</span>
          <span class="bottom-nav-label">Photo</span>
        </button>

        <button class="bottom-nav-item" type="button" data-filter="food">
          <span class="bottom-nav-icon">★</span>
          <span class="bottom-nav-label">Food</span>
        </button>
      </div>
    </aside>
  </div>

  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""
  ></script>

  <script src="./data.js"></script>

  <script>
    function igSearchLink(query) {
      return `https://www.instagram.com/explore/search/keyword/?q=${encodeURIComponent(`${query} Qingdao`)}`;
    }

    function googleVideoSearchLink(query) {
      return `https://www.google.com/search?tbm=vid&q=${encodeURIComponent(`${query} Qingdao short video`)}`;
    }

    function googleImageSearchLink(query) {
      return `https://www.google.com/search?tbm=isch&q=${encodeURIComponent(`${query} Qingdao`)}`;
    }

    function baiduMapLink(place) {
      const keyword = place.zh ? place.zh : place.name;
      const encodedKeyword = encodeURIComponent(keyword);

      return `https://map.baidu.com/search/${encodedKeyword}/?querytype=s&da_src=shareurl&wd=${encodedKeyword}&c=236&src=0&pn=0&sug=0&l=13&from=webmap&device_ratio=1`;
    }

    function toRadians(value) {
      return (value * Math.PI) / 180;
    }

    function haversineKm(lat1, lng1, lat2, lng2) {
      const earthRadiusKm = 6371;
      const deltaLat = toRadians(lat2 - lat1);
      const deltaLng = toRadians(lng2 - lng1);

      const a =
        Math.sin(deltaLat / 2) * Math.sin(deltaLat / 2) +
        Math.cos(toRadians(lat1)) *
          Math.cos(toRadians(lat2)) *
          Math.sin(deltaLng / 2) *
          Math.sin(deltaLng / 2);

      const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));

      return earthRadiusKm * c;
    }

    function estimateWalkingKmFromHotel(hotel, lat, lng) {
      const straightKm = haversineKm(hotel.lat, hotel.lng, lat, lng);
      const walkingKm = straightKm * 1.25;
      return Number(walkingKm.toFixed(1));
    }

    function estimateWalkMinutes(distanceKm) {
      return Math.max(3, Math.round((distanceKm / 4.6) * 60));
    }

    function formatDistanceText(distanceKm) {
      return `${distanceKm.toFixed(1)} km from hotel`;
    }

    function escapeHtml(value) {
      if (value === null || value === undefined) {
        return "";
      }

      return String(value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function createPlace(place) {
      return {
        ...place,
        ig: place.ig || igSearchLink(place.name),
        video: place.video || googleVideoSearchLink(place.name),
        image: place.image || googleImageSearchLink(place.name),
        baidu: place.baidu || baiduMapLink(place),
        description: place.description || place.note || ""
      };
    }

    function createAppState() {
      const rawData = window.APP_DATA;

      return {
        hotel: rawData.hotel,
        transportGuide: rawData.transportGuide || {},
        itineraries: rawData.itineraries || [],
        places: (rawData.places || []).map(createPlace),
        dayRoutes: rawData.dayRoutes || {},
        photoPlaces: rawData.photoPlaces || [],
        foodPlaces: rawData.foodPlaces || [],
        map: null,
        markerLayer: null,
        markerRefs: {},
        placeRefs: {},
        routeLayers: {},
        activeFilter: "all",
        isSheetExpanded: true
      };
    }

    function getGuide(state, placeName) {
      return (
        state.transportGuide[placeName] || {
          mode: "walk",
          summary: "Walkable",
          station: "-",
          line: "-",
          exit: "-",
          note: "Close to hotel or inside walking route"
        }
      );
    }

    function getDistanceFromHotel(state, place) {
      if (place.name === state.hotel.name) {
        return 0;
      }

      return estimateWalkingKmFromHotel(state.hotel, place.lat, place.lng);
    }

    function getMarkerColor(place) {
      if (place.cat === "hotel") return "var(--hotel)";
      if (place.cat === "food") return "var(--food)";
      if (place.day === "day1") return "var(--day1)";
      if (place.day === "day2") return "var(--day2)";
      if (place.day === "day3") return "var(--day3)";
      return "var(--photo)";
    }

    function getMarkerLabel(place) {
      if (place.cat === "hotel") return "H";
      if (place.cat === "food") return "F";
      if (place.cat === "photo") return "P";
      return "•";
    }

    function createMarkerIcon(place) {
      return L.divIcon({
        className: "",
        html: `
          <div style="
            width:34px;
            height:34px;
            border-radius:999px;
            background:${getMarkerColor(place)};
            display:grid;
            place-items:center;
            color:white;
            font-weight:800;
            font-size:12px;
            border:2px solid rgba(255,255,255,.95);
            box-shadow:0 10px 24px rgba(40,15,120,.28);
          ">
            ${getMarkerLabel(place)}
          </div>
        `,
        iconSize: [34, 34],
        iconAnchor: [17, 17]
      });
    }

    function createMap(state) {
      state.map = L.map("map", {
        zoomControl: false,
        attributionControl: false
      }).setView([36.071, 120.339], 13);

      L.tileLayer("https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png", {
        maxZoom: 20,
        subdomains: "abcd"
      }).addTo(state.map);

      L.control.zoom({
        position: "bottomright"
      }).addTo(state.map);

      state.markerLayer = L.layerGroup().addTo(state.map);
    }

    function renderMarkers(state) {
      state.places.forEach((place) => {
        state.placeRefs[place.name] = place;

        const marker = L.marker([place.lat, place.lng], {
          icon: createMarkerIcon(place)
        });

        marker.addTo(state.markerLayer);
        state.markerRefs[place.name] = marker;
      });
    }

    function renderRoutes(state) {
      if (state.dayRoutes.day1) {
        state.routeLayers.day1 = L.polyline(state.dayRoutes.day1, {
          color: "#ff4fd8",
          weight: 4,
          opacity: 0.95
        }).addTo(state.map);
      }

      if (state.dayRoutes.day2) {
        state.routeLayers.day2 = L.polyline(state.dayRoutes.day2, {
          color: "#6d5cff",
          weight: 4,
          opacity: 0.95,
          dashArray: "10 8"
        }).addTo(state.map);
      }

      if (state.dayRoutes.day3) {
        state.routeLayers.day3 = L.polyline(state.dayRoutes.day3, {
          color: "#14d9ff",
          weight: 4,
          opacity: 0.95,
          dashArray: "7 8"
        }).addTo(state.map);
      }
    }

    function focusPlace(state, placeName, zoom = 16) {
      const marker = state.markerRefs[placeName];

      if (!marker) {
        return;
      }

      const latLng = marker.getLatLng();
      state.map.setView(latLng, zoom, { animate: true });
    }

    function toggleRoute(state, routeKey) {
      const route = state.routeLayers[routeKey];

      if (!route) {
        return;
      }

      if (state.map.hasLayer(route)) {
        state.map.removeLayer(route);
      } else {
        route.addTo(state.map);
      }
    }

    function setRouteVisibility(state, activeFilter) {
      const showAll =
        activeFilter === "all" ||
        activeFilter === "photo" ||
        activeFilter === "food" ||
        activeFilter === "metro";

      Object.entries(state.routeLayers).forEach(([routeKey, routeLayer]) => {
        const shouldShow = showAll || routeKey === activeFilter;

        if (shouldShow && !state.map.hasLayer(routeLayer)) {
          routeLayer.addTo(state.map);
        }

        if (!shouldShow && state.map.hasLayer(routeLayer)) {
          state.map.removeLayer(routeLayer);
        }
      });
    }

    function setMarkerVisibility(state, activeFilter) {
      const showAll = activeFilter === "all" || activeFilter === "metro";

      state.places.forEach((place) => {
        const marker = state.markerRefs[place.name];

        const shouldShow =
          showAll ||
          place.cat === "hotel" ||
          (activeFilter === "photo" && place.cat === "photo") ||
          (activeFilter === "food" && place.cat === "food") ||
          place.day === activeFilter;

        if (shouldShow && !state.markerLayer.hasLayer(marker)) {
          state.markerLayer.addLayer(marker);
        }

        if (!shouldShow && state.markerLayer.hasLayer(marker)) {
          state.markerLayer.removeLayer(marker);
        }
      });
    }

    function updateActiveFilterButtons(activeFilter) {
      document.querySelectorAll(".chip-btn").forEach((button) => {
        button.classList.toggle("active", button.dataset.filter === activeFilter);
      });

      document.querySelectorAll(".top-filter-btn").forEach((button) => {
        button.classList.toggle("active", button.dataset.filter === activeFilter);
      });

      document.querySelectorAll(".bottom-nav-item").forEach((button) => {
        button.classList.toggle("active", button.dataset.filter === activeFilter);
      });
    }

    function updateDaySectionVisibility(activeFilter) {
      const daySections = document.querySelectorAll(".route-card[data-group]");

      daySections.forEach((section) => {
        const group = section.dataset.group;
        let show = false;

        if (activeFilter === "all" || activeFilter === "metro") {
          show = true;
        } else if (activeFilter === "photo") {
          show = group === "photo";
        } else if (activeFilter === "food") {
          show = group === "food";
        } else {
          show = group === activeFilter;
        }

        section.style.display = show ? "" : "none";
      });
    }

    function filterCards(activeFilter) {
      const cards = document.querySelectorAll(".place-card");

      cards.forEach((card) => {
        const day = card.dataset.day || "";
        const cat = card.dataset.cat || "";

        let show = false;

        if (activeFilter === "all" || activeFilter === "metro") {
          show = true;
        } else if (activeFilter === "day1") {
          show = day === "day1";
        } else if (activeFilter === "day2") {
          show = day === "day2";
        } else if (activeFilter === "day3") {
          show = day === "day3";
        } else if (activeFilter === "photo") {
          show = cat === "photo";
        } else if (activeFilter === "food") {
          show = cat === "food";
        }

        card.style.display = show ? "" : "none";
      });
    }

    function updateFilter(state, activeFilter) {
      state.activeFilter = activeFilter;
      updateActiveFilterButtons(activeFilter);
      setRouteVisibility(state, activeFilter);
      setMarkerVisibility(state, activeFilter);
      updateDaySectionVisibility(activeFilter);
      filterCards(activeFilter);
    }

    function buildTransportDetailHtml(state, place) {
      const guide = getGuide(state, place.name);
      const distanceKm = getDistanceFromHotel(state, place);
      const walkMinutes = estimateWalkMinutes(distanceKm);

      if (guide.mode === "start") {
        return `
          <div class="place-info-grid">
            <div class="info-chip"><span class="info-label">Transport</span><span class="info-value">${escapeHtml(guide.summary)}</span></div>
            <div class="info-chip"><span class="info-label">Station</span><span class="info-value">${escapeHtml(guide.station)}</span></div>
            <div class="info-chip"><span class="info-label">Line</span><span class="info-value">${escapeHtml(guide.line)}</span></div>
            <div class="info-chip"><span class="info-label">Exit</span><span class="info-value">${escapeHtml(guide.exit)}</span></div>
            <div class="info-chip full"><span class="info-label">Note</span><span class="info-value">${escapeHtml(guide.note)}</span></div>
          </div>
        `;
      }

      return `
        <div class="place-info-grid">
          <div class="info-chip"><span class="info-label">Distance</span><span class="info-value">${formatDistanceText(distanceKm)}</span></div>
          <div class="info-chip"><span class="info-label">Walking</span><span class="info-value">~ ${walkMinutes} min</span></div>
          <div class="info-chip"><span class="info-label">Best way</span><span class="info-value">${escapeHtml(guide.summary)}</span></div>
          <div class="info-chip"><span class="info-label">Station</span><span class="info-value">${escapeHtml(guide.station)}</span></div>
          <div class="info-chip"><span class="info-label">Line</span><span class="info-value">${escapeHtml(guide.line)}</span></div>
          <div class="info-chip"><span class="info-label">Exit</span><span class="info-value">${escapeHtml(guide.exit)}</span></div>
          <div class="info-chip full"><span class="info-label">Transit note</span><span class="info-value">${escapeHtml(guide.note)}</span></div>
        </div>
      `;
    }

    function buildPlaceCard(state, placeName, index) {
      const place = state.placeRefs[placeName];

      if (!place) {
        return "";
      }

      return `
        <div
          class="place-card"
          data-day="${escapeHtml(place.day || "")}"
          data-cat="${escapeHtml(place.cat || "")}"
        >
          <button class="place-card-main" data-place="${escapeHtml(place.name)}" type="button">
            <div class="place-card-top">
              <div class="place-card-title-block">
                <div class="place-card-title">${escapeHtml(place.name)}</div>
                <div class="place-card-subtitle">${escapeHtml(place.zh || "")}</div>
              </div>
              <div class="place-card-number">${index + 1}</div>
            </div>

            <div class="place-meta">
              <span class="place-meta-item">${escapeHtml(place.district || "-")}</span>
              <span class="place-meta-dot">•</span>
              <span class="place-meta-item">${escapeHtml(place.best || "-")}</span>
            </div>

            <div class="place-description">
              ${escapeHtml(place.description || place.note || "")}
            </div>

            <div class="place-note-box">
              <div class="place-section-title">Quick note</div>
              <div class="place-note-text">${escapeHtml(place.note || "-")}</div>
            </div>

            <div class="place-transport-box">
              <div class="place-section-title">Transport details</div>
              ${buildTransportDetailHtml(state, place)}
            </div>
          </button>

          <div class="place-card-actions">
            <button
              type="button"
              class="place-card-copy"
              data-copy="${escapeHtml(place.zh || place.name)}"
            >
              Copy 中文
            </button>

            <a
              href="${place.ig}"
              target="_blank"
              rel="noopener noreferrer"
              class="place-card-link"
            >
              IG
            </a>

            <a
              href="${place.image}"
              target="_blank"
              rel="noopener noreferrer"
              class="place-card-link"
            >
              Image
            </a>

            <a
              href="${place.video}"
              target="_blank"
              rel="noopener noreferrer"
              class="place-card-link"
            >
              Video
            </a>

            <a
              href="${place.baidu}"
              target="_blank"
              rel="noopener noreferrer"
              class="place-card-link place-card-link-dark"
            >
              Baidu Map
            </a>
          </div>
        </div>
      `;
    }

    function buildDayCard(state, day) {
      const pointRows = (day.points || [])
        .map((pointName, index) => buildPlaceCard(state, pointName, index))
        .join("");

      const descriptionHtml = day.description
        ? `<div class="route-card-description">${escapeHtml(day.description)}</div>`
        : "";

      return `
        <div class="route-card" data-group="${escapeHtml(day.id)}">
          <div class="route-card-header">
            <div class="route-card-left">
              <input
                class="route-card-checkbox"
                type="checkbox"
                checked
                data-toggle-route="${escapeHtml(day.id)}"
              />

              <div class="route-card-title-wrap">
                <div class="route-card-title">${escapeHtml(day.title)}</div>
                <div class="route-card-subtitle">${escapeHtml(day.subtitle || "")}</div>
                ${descriptionHtml}
              </div>
            </div>

            <div class="route-card-badge" style="background:${day.color};">
              ${(day.points || []).length} pts
            </div>
          </div>

          <div class="route-card-body">
            ${pointRows}
          </div>
        </div>
      `;
    }

    function renderSidebar(state) {
      const sidebarContent = document.getElementById("sidebarContent");

      const itineraryCardsHtml = state.itineraries
        .map((day) => buildDayCard(state, day))
        .join("");

      const photoRowsHtml = state.photoPlaces
        .map((pointName, index) => buildPlaceCard(state, pointName, index))
        .join("");

      const foodRowsHtml = state.foodPlaces
        .map((pointName, index) => buildPlaceCard(state, pointName, index))
        .join("");

      sidebarContent.innerHTML = `
        <div class="sheet-content">
          ${itineraryCardsHtml}

          <div class="route-card" data-group="photo">
            <div class="route-card-header">
              <div class="route-card-left">
                <div class="route-card-title-wrap">
                  <div class="route-card-title">Photo Spots</div>
                  <div class="route-card-subtitle">Extra iconic viewpoints and photo locations</div>
                  <div class="route-card-description">
                    รวมจุดถ่ายรูปสำคัญที่อยู่นอกแผนเที่ยวหลัก แต่ควรแวะถ้ามีเวลา
                  </div>
                </div>
              </div>

              <div class="route-card-badge route-card-badge-dark">
                ${state.photoPlaces.length}
              </div>
            </div>

            <div class="route-card-body">
              ${photoRowsHtml}
            </div>
          </div>

          <div class="route-card" data-group="food">
            <div class="route-card-header">
              <div class="route-card-left">
                <div class="route-card-title-wrap">
                  <div class="route-card-title">Local Food</div>
                  <div class="route-card-subtitle">Restaurants, food street, beer street, night market</div>
                  <div class="route-card-description">
                    รวมร้านอาหารและโซนของกินที่เหมาะกับมื้อหลัก ของว่าง และเดินกินตอนกลางคืน
                  </div>
                </div>
              </div>

              <div class="route-card-badge route-card-badge-food">
                ${state.foodPlaces.length}
              </div>
            </div>

            <div class="route-card-body">
              ${foodRowsHtml}
            </div>
          </div>
        </div>
      `;
    }

    function openSheet(state) {
      state.isSheetExpanded = true;
      document.getElementById("bottomSheet").classList.add("expanded");
    }

    function closeSheet(state) {
      state.isSheetExpanded = false;
      document.getElementById("bottomSheet").classList.remove("expanded");
    }

    function toggleSheet(state) {
      if (state.isSheetExpanded) {
        closeSheet(state);
      } else {
        openSheet(state);
      }
    }

    function bindFilterEvents(state) {
      const chipBar = document.getElementById("chipBar");
      const sidebarActions = document.querySelector(".sidebar-actions");
      const bottomNav = document.querySelector(".bottom-nav");

      chipBar.addEventListener("click", (event) => {
        const button = event.target.closest("[data-filter]");

        if (!button) {
          return;
        }

        updateFilter(state, button.dataset.filter);
      });

      sidebarActions.addEventListener("click", (event) => {
        const button = event.target.closest("[data-filter]");

        if (!button) {
          return;
        }

        updateFilter(state, button.dataset.filter);
      });

      bottomNav.addEventListener("click", (event) => {
        const button = event.target.closest("[data-filter]");

        if (!button) {
          return;
        }

        updateFilter(state, button.dataset.filter);
      });
    }

    function bindPlaceEvents(state) {
      document.addEventListener("click", (event) => {
        const placeButton = event.target.closest("[data-place]");

        if (!placeButton) {
          return;
        }

        focusPlace(state, placeButton.dataset.place);
      });
    }

    function bindRouteToggleEvents(state) {
      document.addEventListener("change", (event) => {
        const toggleInput = event.target.closest("[data-toggle-route]");

        if (!toggleInput) {
          return;
        }

        toggleRoute(state, toggleInput.dataset.toggleRoute);
      });
    }

    function bindSearchEvents(state) {
      const searchInput = document.getElementById("searchInput");

      searchInput.addEventListener("input", (event) => {
        const keyword = event.target.value.trim().toLowerCase();

        if (!keyword) {
          return;
        }

        const matchedPlace = state.places.find((place) => {
          return [
            place.name,
            place.zh,
            place.note,
            place.district,
            place.description
          ]
            .filter(Boolean)
            .join(" ")
            .toLowerCase()
            .includes(keyword);
        });

        if (matchedPlace) {
          focusPlace(state, matchedPlace.name, 15);
        }
      });
    }

    async function copyTextToClipboard(text) {
      try {
        await navigator.clipboard.writeText(text);
        return true;
      } catch (error) {
        const tempInput = document.createElement("textarea");
        tempInput.value = text;
        tempInput.style.position = "fixed";
        tempInput.style.opacity = "0";
        tempInput.style.pointerEvents = "none";

        document.body.appendChild(tempInput);
        tempInput.focus();
        tempInput.select();

        let success = false;

        try {
          success = document.execCommand("copy");
        } catch (copyError) {
          success = false;
        }

        document.body.removeChild(tempInput);
        return success;
      }
    }

    function bindCopyEvents() {
      document.addEventListener("click", async (event) => {
        const copyButton = event.target.closest("[data-copy]");

        if (!copyButton) {
          return;
        }

        const textToCopy = copyButton.getAttribute("data-copy");
        const originalText = copyButton.textContent;
        const copied = await copyTextToClipboard(textToCopy);

        if (copied) {
          copyButton.textContent = "✅ Copied";

          setTimeout(() => {
            copyButton.textContent = originalText;
          }, 1500);
        } else {
          alert("Copy failed");
        }
      });
    }

    function bindSheetEvents(state) {
      const openSheetBtn = document.getElementById("openSheetBtn");
      const sheetHandle = document.getElementById("sheetHandle");

      openSheetBtn.addEventListener("click", () => {
        toggleSheet(state);
      });

      sheetHandle.addEventListener("click", () => {
        toggleSheet(state);
      });
    }

    function bindEvents(state) {
      bindFilterEvents(state);
      bindPlaceEvents(state);
      bindRouteToggleEvents(state);
      bindSearchEvents(state);
      bindCopyEvents();
      bindSheetEvents(state);
    }

    function initApp() {
      const state = createAppState();

      createMap(state);
      renderMarkers(state);
      renderRoutes(state);
      renderSidebar(state);
      bindEvents(state);
      updateFilter(state, "all");
    }

    try {
      initApp();
    } catch (error) {
      console.error("Failed to initialize app:", error);
      alert("โหลดแผนที่ไม่สำเร็จ กรุณาตรวจสอบไฟล์ index.html, index.css และ data.js");
    }
  </script>
</body>
</html>
